<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>鸟鸟QQ - 完整版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", Arial, sans-serif;
        }
        
        body {
            background: linear-gradient(to bottom, #1e3c72, #2a5298);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        /* QQ主容器 */
        .qq-container {
            width: 1000px;
            height: 700px;
            background: #f0f0f0;
            border-radius: 8px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.3);
            display: flex;
            overflow: hidden;
            border: 1px solid #b5b5b5;
        }
        
        /* 左侧边栏 - QQ好友列表样式 */
        .left-sidebar {
            width: 250px;
            background: #f9f9f9;
            border-right: 1px solid #d4d4d4;
            display: flex;
            flex-direction: column;
        }
        
        /* QQ标题栏 */
        .qq-header {
            height: 60px;
            background: linear-gradient(to bottom, #3a8cff, #2a7aff);
            color: white;
            display: flex;
            align-items: center;
            padding: 0 20px;
            font-size: 18px;
            font-weight: bold;
        }
        
        .qq-header span {
            margin-left: 10px;
        }
        
        /* 小鸟列表 */
        .bird-list {
            flex: 1;
            overflow-y: auto;
            background: white;
        }
        
        /* 单个小鸟项目 */
        .bird-item {
            display: flex;
            align-items: center;
            padding: 12px 15px;
            border-bottom: 1px solid #f0f0f0;
            cursor: pointer;
            transition: background 0.2s;
            position: relative;
        }
        
        .bird-item:hover {
            background: #f0f8ff;
        }
        
        .bird-item.active {
            background: #e3f2ff;
            border-left: 3px solid #3a8cff;
        }
        
        /* 消息红点 */
        .message-badge {
            position: absolute;
            top: 8px;
            right: 8px;
            background: #ff4444;
            color: white;
            font-size: 10px;
            min-width: 16px;
            height: 16px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 4px;
            font-weight: bold;
            animation: badgePulse 2s infinite;
        }
        
        @keyframes badgePulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }
        
        /* 小鸟头像 */
        .bird-avatar {
            width: 50px;
            height: 50px;
            border-radius: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            margin-right: 12px;
            border: 1px solid #ddd;
        }
        
        /* 小鸟信息 */
        .bird-info {
            flex: 1;
        }
        
        .bird-name {
            font-weight: bold;
            font-size: 14px;
            color: #333;
            margin-bottom: 3px;
        }
        
        .bird-species {
            font-size: 12px;
            color: #888;
            margin-bottom: 5px;
        }
        
        /* 小鸟状态指示器 */
        .bird-status {
            font-size: 11px;
            padding: 2px 8px;
            border-radius: 10px;
            display: inline-block;
        }
        
        .status-online {
            background: #e1f7e1;
            color: #2e7d32;
        }
        
        .status-offline {
            background: #f5f5f5;
            color: #757575;
        }
        
        .status-busy {
            background: #ffebee;
            color: #c62828;
        }
        
        /* 右侧聊天区域 */
        .right-chat {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: white;
        }
        
        /* 聊天标题栏 */
        .chat-header {
            height: 60px;
            background: linear-gradient(to bottom, #f8f8f8, #e8e8e8);
            border-bottom: 1px solid #d4d4d4;
            display: flex;
            align-items: center;
            padding: 0 20px;
        }
        
        .current-bird-avatar {
            width: 40px;
            height: 40px;
            border-radius: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            margin-right: 10px;
        }
        
        .chat-bird-info h3 {
            font-size: 16px;
            color: #333;
            margin-bottom: 3px;
        }
        
        .chat-bird-info p {
            font-size: 12px;
            color: #666;
        }
        
        /* 聊天消息区域 */
        .chat-messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            background: #f5f5f5;
            display: flex;
            flex-direction: column;
        }
        
        /* 消息气泡 */
        .message {
            max-width: 70%;
            margin-bottom: 15px;
            animation: fadeIn 0.3s;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .message-bubble {
            padding: 10px 15px;
            border-radius: 5px;
            position: relative;
            word-wrap: break-word;
            font-size: 14px;
            line-height: 1.5;
        }
        
        /* 对方消息（小鸟） */
        .bird-message {
            align-self: flex-start;
        }
        
        .bird-message .message-bubble {
            background: white;
            border: 1px solid #d4d4d4;
            border-top-left-radius: 0;
        }
        
        .bird-message .message-bubble:before {
            content: '';
            position: absolute;
            top: 0;
            left: -8px;
            width: 0;
            height: 0;
            border-top: 8px solid white;
            border-left: 8px solid transparent;
        }
        
        .bird-message .message-bubble:after {
            content: '';
            position: absolute;
            top: 0;
            left: -9px;
            width: 0;
            height: 0;
            border-top: 8px solid #d4d4d4;
            border-left: 8px solid transparent;
        }
        
        .message-time {
            font-size: 11px;
            color: #999;
            margin-top: 5px;
        }
        
        /* 我的消息 */
        .my-message {
            align-self: flex-end;
        }
        
        .my-message .message-bubble {
            background: #e3f2ff;
            border: 1px solid #b3d7ff;
            border-top-right-radius: 0;
            color: #333;
        }
        
        .my-message .message-bubble:before {
            content: '';
            position: absolute;
            top: 0;
            right: -8px;
            width: 0;
            height: 0;
            border-top: 8px solid #e3f2ff;
            border-right: 8px solid transparent;
        }
        
        .my-message .message-bubble:after {
            content: '';
            position: absolute;
            top: 0;
            right: -9px;
            width: 0;
            height: 0;
            border-top: 8px solid #b3d7ff;
            border-right: 8px solid transparent;
        }
        
        /* 输入区域 */
        .input-area {
            border-top: 1px solid #d4d4d4;
            padding: 15px;
            background: #f8f8f8;
        }
        
        .input-container {
            display: flex;
        }
        
        #message-input {
            flex: 1;
            padding: 12px 15px;
            border: 1px solid #d4d4d4;
            border-radius: 5px;
            font-size: 14px;
            outline: none;
            resize: none;
            height: 60px;
        }
        
        #message-input:focus {
            border-color: #3a8cff;
        }
        
        #send-btn {
            width: 80px;
            margin-left: 10px;
            background: #3a8cff;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 14px;
            cursor: pointer;
            transition: background 0.2s;
        }
        
        #send-btn:hover {
            background: #2a7aff;
        }
        
        /* 小鸟状态标签 */
        .status-tag {
            display: inline-block;
            font-size: 10px;
            padding: 1px 6px;
            border-radius: 3px;
            margin-left: 5px;
        }
        
        .tag-sleeping { background: #e8e8e8; color: #666; }
        .tag-busy { background: #ffebee; color: #c62828; }
        .tag-online { background: #e8f5e9; color: #2e7d32; }
        
        /* QQ经典滚动条 */
        ::-webkit-scrollbar {
            width: 8px;
        }
        
        ::-webkit-scrollbar-track {
            background: #f1f1f1;
        }
        
        ::-webkit-scrollbar-thumb {
            background: #c1c1c1;
            border-radius: 4px;
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: #a8a8a8;
        }
        
        /* 小鸟被吵醒的动画 */
        @keyframes wakeUp {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }
        
        .wake-up {
            animation: wakeUp 0.5s ease;
        }
        
        /* 系统消息 */
        .system-message {
            align-self: center;
            background: #f0f0f0;
            padding: 8px 15px;
            border-radius: 15px;
            font-size: 12px;
            color: #666;
            margin-bottom: 15px;
        }
        
        /* 小鸟主动发来的消息样式 */
        .bird-active-message {
            border: 1px dashed #ff9800;
        }
        
        /* 顶部通知栏 */
        .notification-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: linear-gradient(to right, #ff9800, #ff5722);
            color: white;
            padding: 8px 20px;
            font-size: 12px;
            display: none;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
            animation: slideDown 0.3s ease-out;
        }
        
        @keyframes slideDown {
            from { transform: translateY(-100%); }
            to { transform: translateY(0); }
        }
        
        .notification-close {
            background: none;
            border: none;
            color: white;
            font-size: 16px;
            cursor: pointer;
        }
        
        /* 发送提示 */
        .send-hint {
            font-size: 11px;
            color: #666;
            text-align: right;
            margin-top: 5px;
        }
        
        /* 离线状态提示 */
        .offline-hint {
            font-size: 11px;
            color: #ff6b6b;
            font-style: italic;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <!-- 顶部通知栏 -->
    <div class="notification-bar" id="notification-bar">
        <span id="notification-text">新消息</span>
        <button class="notification-close" onclick="closeNotification()">×</button>
    </div>
    
    <!-- QQ主容器 -->
    <div class="qq-container">
        <!-- 左侧边栏 -->
        <div class="left-sidebar">
            <div class="qq-header">
                <i class="fas fa-dove"></i>
                <span>鸟鸟QQ</span>
            </div>
            
            <div class="bird-list" id="bird-list">
                <!-- 小鸟列表会由JS动态生成 -->
            </div>
        </div>
        
        <!-- 右侧聊天区域 -->
        <div class="right-chat">
            <div class="chat-header">
                <div class="current-bird-avatar" id="current-bird-avatar">🐦</div>
                <div class="chat-bird-info">
                    <h3 id="current-bird-name">选择一只小鸟开始聊天</h3>
                    <p id="current-bird-status">点击左侧小鸟头像</p>
                </div>
            </div>
            
            <div class="chat-messages" id="chat-messages">

            </div>
            
            <div class="input-area">
                <div class="input-container">
                    <textarea id="message-input" placeholder="输入消息...（按Enter发送，Shift+Enter换行）"></textarea>
                    <button id="send-btn">发送</button>
                </div>
                <div class="send-hint">Enter发送，Shift+Enter换行</div>
            </div>
        </div>
    </div>

        // ==================== 关键词-意图映射库 ====================
        const INTENT_KEYWORDS = {
            exclamation: { keywords: ["啊", "呀", "哇", "哦", "天哪", "!", "！"], weight: 1 },
            question: { keywords: ["什么", "咋", "怎么", "为啥", "？", "?", "吗", "呢", "嘛"], weight: 1 },
            doing: { keywords: ["在干嘛", "在做什么", "干啥", "忙什么", "干嘛", "干啥呢"], weight: 1 },
            happy: { keywords: ["哈哈", "嘿嘿", "嘻嘻", "呵呵", "笑死", "233", "开心", "高兴"], weight: 1 },
            sad: { keywords: ["唉", "呜呜", "难过", "伤心", "哭了", "难受", "委屈"], weight: 1 },
            greeting: { keywords: ["你好", "嗨", "早上好", "晚上好", "在吗", "哈喽", "hello"], weight: 1 }
        };

        // ==================== 状态管理 ====================
        let currentBird = null;
        let isWaitingReply = false;
        let conversations = {}; // 保存对话历史
        let activeMessageInterval = null; // 小鸟主动发消息的定时器

        // ==================== 工具函数 ====================
        function getCurrentHour() {
            return new Date().getHours();
        }

        function getCurrentTime() {
            return new Date().toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
        }

        // 检查小鸟是否在线
        function isBirdActive(birdName) {
            const bird = BIRDS[birdName];
            const hour = getCurrentHour();
            return bird.schedule.activeHours.includes(hour);
        }

        // 获取小鸟当前状态
        function getBirdStatus(birdName) {
            const bird = BIRDS[birdName];
            if (!isBirdActive(birdName)) {
                return "💤 离线中（发送消息唤醒我）";
            }
            
            const hour = getCurrentHour();
            let period = "morning";
            if (hour < 6) period = "dawn";
            else if (hour < 12) period = "morning";
            else if (hour < 18) period = "noon";
            else period = "evening";
            
            return "🟢 在线";
        }

        // 获取状态标签
        function getStatusTag(birdName) {
            const bird = BIRDS[birdName];
            if (!isBirdActive(birdName)) {
                return '<span class="status-tag tag-sleeping">离线</span>';
            }
            
            return '<span class="status-tag tag-online">在线</span>';
        }

        // 更新小鸟未读消息数显示
        function updateUnreadBadge(birdName) {
            const bird = BIRDS[birdName];
            const birdItem = document.querySelector(`.bird-item[data-bird="${birdName}"]`);
            if (!birdItem) return;
            
            const oldBadge = birdItem.querySelector('.message-badge');
            if (oldBadge) {
                oldBadge.remove();
            }
            
            if (bird.unreadCount > 0) {
                const badge = document.createElement('div');
                badge.className = 'message-badge';
                badge.textContent = bird.unreadCount > 99 ? '99+' : bird.unreadCount;
                birdItem.appendChild(badge);
            }
        }

        // 检测用户意图
        function detectIntent(message) {
            const lowerMsg = message.toLowerCase();
            for (const [intent, config] of Object.entries(INTENT_KEYWORDS)) {
                if (config.keywords.some(keyword => lowerMsg.includes(keyword))) {
                    return intent;
                }
            }
            return "default";
        }

        // 生成小鸟回复
        function generateBirdResponse(userMessage, birdName) {
            const bird = BIRDS[birdName];
            const mood = bird.mood;
            
            // 检测意图
            const intent = detectIntent(userMessage);
            
            // 获取对应回复库
            const responsePool = BIRD_RESPONSES[birdName][intent] || BIRD_RESPONSES[birdName].default;
            
            // 随机选择回复
            let response = responsePool[Math.floor(Math.random() * responsePool.length)];
            
            // 心情影响回复
            if (mood < 0.4 && Math.random() < 0.5) {
                const moodEmoji = ["😠", "😤", "🤬", "💢"][Math.floor(Math.random() * 4)];
                response += ` （心情不好${moodEmoji}）`;
            } else if (mood > 0.8 && Math.random() < 0.5) {
                const moodEmoji = ["🥰", "😄", "🤩", "✨"][Math.floor(Math.random() * 4)];
                response += ` （超开心${moodEmoji}）`;
            }
            
            // 30%概率加网络语
            if (Math.random() < 0.3) {
                const slang = bird.personality.slang[Math.floor(Math.random() * bird.personality.slang.length)];
                response = slang + "！" + response;
            }
            
            // 10%概率加拟声词
            if (Math.random() < 0.1) {
                const sound = bird.onomatopoeia[Math.floor(Math.random() * bird.onomatopoeia.length)];
                response = sound + "..." + response;
            }
            
            // 更新心情
            bird.mood = Math.min(1, bird.mood + 0.05);
            
            return response;
        }

        // ==================== 初始化小鸟列表 ====================
        function initBirdList() {
            const birdList = document.getElementById('bird-list');
            birdList.innerHTML = '';
            
            Object.keys(BIRDS).forEach(birdName => {
                const bird = BIRDS[birdName];
                const birdItem = document.createElement('div');
                birdItem.className = 'bird-item';
                birdItem.dataset.bird = birdName;
                
                const isActive = isBirdActive(birdName);
                const statusClass = isActive ? 'status-online' : 'status-offline';
                
                birdItem.innerHTML = `
                    <div class="bird-avatar" style="background: ${bird.color}">${bird.avatar}</div>
                    <div class="bird-info">
                        <div class="bird-name">${bird.nickname} ${getStatusTag(birdName)}</div>
                        <div class="bird-species">${bird.species}</div>
                        <div class="bird-status ${statusClass}">${getBirdStatus(birdName)}</div>
                    </div>
                `;
                
                birdItem.addEventListener('click', () => selectBird(birdName));
                birdList.appendChild(birdItem);
                
                if (!conversations[birdName]) {
                    conversations[birdName] = [];
                }
                
                updateUnreadBadge(birdName);
            });
        }

        // ==================== 选择小鸟 ====================
        function selectBird(birdName) {
            currentBird = birdName;
            const bird = BIRDS[birdName];
            
            // 标记已接触
            bird.hasBeenContacted = true;
            
            // 清空未读
            bird.unreadCount = 0;
            updateUnreadBadge(birdName);
            
            // 更新UI
            document.querySelectorAll('.bird-item').forEach(item => {
                item.classList.remove('active');
            });
            document.querySelector(`.bird-item[data-bird="${birdName}"]`).classList.add('active');
            
            document.getElementById('current-bird-avatar').innerHTML = bird.avatar;
            document.getElementById('current-bird-avatar').style.background = bird.color;
            document.getElementById('current-bird-name').textContent = `${bird.nickname} (${bird.species})`;
            document.getElementById('current-bird-status').textContent = getBirdStatus(birdName);
            
            // 显示聊天记录
            showConversation(birdName);
            
            // 更新状态显示
            updateBirdStatus(birdName);
        }

        // 更新小鸟状态显示
        function updateBirdStatus(birdName) {
            const birdItem = document.querySelector(`.bird-item[data-bird="${birdName}"]`);
            if (birdItem) {
                const bird = BIRDS[birdName];
                const statusClass = isBirdActive(birdName) ? 'status-online' : 'status-offline';
                const statusEl = birdItem.querySelector('.bird-status');
                statusEl.className = `bird-status ${statusClass}`;
                statusEl.textContent = getBirdStatus(birdName);
                
                const statusTag = birdItem.querySelector('.status-tag');
                if (statusTag) {
                    statusTag.outerHTML = getStatusTag(birdName);
                }
            }
        }

        // ==================== 聊天功能 ====================
        function showConversation(birdName) {
            const chatMessages = document.getElementById('chat-messages');
            chatMessages.innerHTML = '';
            
            if (!conversations[birdName] || conversations[birdName].length === 0) {
                const bird = BIRDS[birdName];
                let welcomeMsg = `你好！我是${bird.nickname}，一只${bird.species}~`;
                if (!isBirdActive(birdName)) {
                    welcomeMsg = "💤 我正在离线中...发送消息唤醒我吧！";
                }
                addMessageToChat('bird', welcomeMsg, birdName);
                conversations[birdName].push({ sender: 'bird', text: welcomeMsg });
            } else {
                conversations[birdName].forEach(msg => {
                    addMessageToChat(msg.sender, msg.text, birdName);
                });
            }
        }

        // 添加消息到聊天框
        function addMessageToChat(sender, text, birdName, isActiveMessage = false) {
            const chatMessages = document.getElementById('chat-messages');
            const messageDiv = document.createElement('div');
            
            const messageClass = isActiveMessage ? 'bird-message bird-active-message' : 
                              (sender === 'bird' ? 'bird-message' : 'my-message');
            
            messageDiv.className = `message ${messageClass}`;
            messageDiv.innerHTML = `
                <div class="message-bubble">${text}</div>
                <div class="message-time">${getCurrentTime()}</div>
            `;
            
            chatMessages.appendChild(messageDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        // ==================== 发送消息 ====================
        async function sendMessage() {
            const input = document.getElementById('message-input');
            const message = input.value.trim();
            
            if (!message || !currentBird) {
                if (!currentBird) {
                    addMessageToChat('system', '请先在左侧选择一只小鸟！', 'system');
                }
                return;
            }
            
            // 清空输入框
            input.value = '';
            
            const bird = BIRDS[currentBird];
            const wasOffline = !isBirdActive(currentBird);
            const isFirstMessage = !bird.hasBeenMessaged;
            
            // 如果小鸟离线，先唤醒
            if (wasOffline) {
                // 激活小鸟
                bird.schedule.activeHours.push(getCurrentHour());
                // 发送唤醒消息
                const wakeMsg = bird.responses.wakeUp[Math.floor(Math.random() * bird.responses.wakeUp.length)];
                addMessageToChat('bird', wakeMsg, currentBird, true);
                conversations[currentBird].push({ sender: 'bird', text: wakeMsg });
                
                // 更新状态显示
                updateBirdStatus(currentBird);
                document.getElementById('current-bird-status').textContent = getBirdStatus(currentBird);
            }
            
            bird.hasBeenMessaged = true;
            
            // 添加我的消息
            addMessageToChat('user', message, currentBird);
            conversations[currentBird].push({ sender: 'user', text: message });
            
            // 模拟打字中
            isWaitingReply = true;
            const typingIndicator = document.createElement('div');
            typingIndicator.className = 'message bird-message';
            typingIndicator.innerHTML = '<div class="message-bubble">...</div>';
            document.getElementById('chat-messages').appendChild(typingIndicator);
            
            // 模拟思考时间
            const delay = 500 + Math.random() * 1500;
            
            setTimeout(() => {
                typingIndicator.remove();
                
                // 生成回复
                const response = generateBirdResponse(message, currentBird);
                
                // 添加回复
                addMessageToChat('bird', response, currentBird);
                conversations[currentBird].push({ sender: 'bird', text: response });
                
                isWaitingReply = false;
                
            }, delay);
        }

        // ==================== 小鸟主动发送消息功能 ====================
        function sendRandomBirdMessage() {
            const activeBirds = Object.keys(BIRDS).filter(birdName => 
                isBirdActive(birdName) && birdName !== currentBird
            );
            
            if (activeBirds.length === 0) return;
            
            const randomBirdName = activeBirds[Math.floor(Math.random() * activeBirds.length)];
            const bird = BIRDS[randomBirdName];
            
            const messages = bird.responses.activeMessages;
            const randomMessage = messages[Math.floor(Math.random() * messages.length)];
            
            if (!conversations[randomBirdName]) {
                conversations[randomBirdName] = [];
            }
            conversations[randomBirdName].push({ 
                sender: 'bird', 
                text: randomMessage,
                isActiveMessage: true
            });
            
            bird.unreadCount++;
            updateUnreadBadge(randomBirdName);
            
            if (currentBird === randomBirdName) {
                addMessageToChat('bird', randomMessage, randomBirdName, true);
            } else {
                showNotification(`${bird.nickname} 发来新消息: ${randomMessage}`, randomBirdName);
            }
        }

        // 显示通知
        function showNotification(message, birdName) {
            const notificationBar = document.getElementById('notification-bar');
            const notificationText = document.getElementById('notification-text');
            
            notificationText.textContent = message;
            notificationBar.dataset.bird = birdName;
            notificationBar.style.display = 'flex';
            
            setTimeout(() => {
                notificationBar.style.display = 'none';
            }, 5000);
        }

        // 关闭通知
        function closeNotification() {
            document.getElementById('notification-bar').style.display = 'none';
        }

        // 点击通知跳转到对应小鸟
        document.getElementById('notification-bar').addEventListener('click', function() {
            const birdName = this.dataset.bird;
            if (birdName) {
                selectBird(birdName);
                this.style.display = 'none';
            }
        });

        // ==================== 事件监听 ====================
        document.getElementById('send-btn').addEventListener('click', sendMessage);

        document.getElementById('message-input').addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        // 每分钟更新小鸟状态
        setInterval(() => {
            Object.keys(BIRDS).forEach(birdName => {
                updateBirdStatus(birdName);
            });
            
            if (currentBird) {
                document.getElementById('current-bird-status').textContent = getBirdStatus(currentBird);
            }
        }, 60000);

        // 每分钟随机一只小鸟发送消息
        activeMessageInterval = setInterval(() => {
            if (Math.random() < 0.6) {
                sendRandomBirdMessage();
            }
        }, 60000);

        // ==================== 初始化 ====================
        initBirdList();
        
        window.addEventListener('beforeunload', function() {
            if (activeMessageInterval) {
                clearInterval(activeMessageInterval);
            }
        });
    </script>
</body>
</html>
